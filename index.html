
<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ਕੈਲਕੂਲੇਟਰ</title>
    
    <!-- PWA (ਐਪ ਇੰਸਟਾਲ) ਦੀਆਂ ਸੈਟਿੰਗਜ਼ -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- ਫੁੱਲ ਸਕਰੀਨ ਸੈਟਿੰਗਜ਼ (Status bar black) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            /* ਫੋਨ 'ਤੇ ਟੈਕਸਟ ਕਾਪੀ/ਸਲੈਕਟ ਹੋਣ ਤੋਂ ਰੋਕਣ ਲਈ */
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            height: 100dvh;
            /* Safe area - notch ਅਤੇ navigation bar ਤੋਂ ਬਚਾਅ */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            padding: 5px 10px;
            background-color: #000;
            flex-shrink: 0;
            align-items: center;
        }

        .tabs {
            flex: 1;
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding-right: 10px;
            align-items: center;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            min-width: 32px;
            height: 28px;
            border-radius: 14px;
            border: 1px solid #333;
            background: #000;
            color: #aaa;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0 10px;
        }

        .tab.active {
            background: #F07041;
            color: #000;
            border-color: #F07041;
        }

        .add-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #000;
            color: #F07041;
            border: 1px solid #333;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .display {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 20px 5px 20px;
            overflow: hidden;          /* ਬਾਹਰੀ div ਸਕਰੋਲ ਨਹੀਂ ਕਰੇਗਾ */
            position: relative;
        }

        /* ਉੱਪਰਲਾ ਹਿੱਸਾ - ਸਿਰਫ਼ history, ਸਕਰੋਲ ਹੋ ਸਕਦੀ ਹੈ */
        .history-wrap {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .history-wrap::-webkit-scrollbar { display: none; }

        .history {
            color: #888;
            text-align: right;
            font-size: 18px;
            word-break: break-all;
            line-height: 1.4;
            padding-bottom: 4px;
        }
        .history:active { color: #fff; }

        /* ਮੁੱਖ ਇਨਪੁਟ ਖੇਤਰ - ਸਕਰੋਲ ਨਹੀਂ ਹੁੰਦਾ, ਹਮੇਸ਼ਾ ਦਿਖਦਾ ਹੈ */
        .input-result-wrap {
            flex-shrink: 0;
            padding-top: 4px;
        }

        .main-input {
            text-align: right;
            width: 100%;
            word-break: keep-all;
            overflow-wrap: normal;
            line-height: 1.2;
            transition: none;
        }

        .num-token, .op-token {
            border-radius: 8px;
            padding: 0 4px;
            white-space: nowrap;
            display: inline-block;
        }
        .num-token.clickable, .op-token.clickable {
            cursor: pointer;
        }
        .num-token { color: #fff; }
        .op-token { color: #F07041; font-weight: 500; }
        
        .num-token.selected, .op-token.selected {
            background-color: rgba(98, 174, 239, 0.35);
            color: #fff;
        }

        .live-result {
            color: #888;
            text-align: right;
            font-size: 32px;
            min-height: 40px;
            margin-top: 4px;
            font-weight: 400;
            /* ਸਿਰਫ਼ ਟੈਕਸਟ ਤੇ ਕਲਿੱਕ ਕੰਮ ਕਰੇ, ਖਾਲੀ ਜਗ੍ਹਾ ਤੇ ਨਹੀਂ */
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        .live-result span {
            cursor: pointer;
            padding: 4px 0;
        }
        .live-result span:active { opacity: 0.5; }

        .keypad {
            display: flex;
            flex-direction: column;
            padding: 10px 10px 25px 10px;
            gap: 6px;
            flex: 0 0 55%; 
            background-color: #000;
        }

        .row {
            display: flex;
            flex: 1; 
            gap: 6px; 
            justify-content: space-between;
        }

        .btn {
            flex: 1; 
            width: 100%;
            height: 100%;
            border-radius: 20px; 
            border: none;
            background: transparent;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: none;          /* ਜ਼ੀਰੋ delay - ਤੁਰੰਤ ਰਿਸਪੌਂਸ */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* ਡਬਲ-ਟੈਪ zoom ਬੰਦ, delay ਹਟਾਉ */
            user-select: none;
            -webkit-user-select: none;
        }

        .btn:active { background: rgba(255,255,255,0.1); }
        .btn-num { color: #fff; font-weight: 400; }
        .btn-op { color: #F07041; font-size: 38px; }
        .btn-ac { font-size: 24px; color: #F07041; }
        
        /* ਡਿਸਏਬਲ (ਮੱਧਮ) ਕਰਨ ਲਈ ਕਲਾਸ */
        .btn.disabled {
            opacity: 0.25;
            pointer-events: none;
        }

        .btn-eq { background: #F07041; color: #fff; transition: none; }
        .btn-eq:active { filter: brightness(0.8); }

        .action-btn {
            flex: 1;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 20px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { background: rgba(255,255,255,0.1); }
        .delete-tab { color: #F07041; }

        @media (max-height: 700px) {
            .btn { font-size: 26px; border-radius: 16px; }
            .btn-op { font-size: 32px; }
            .keypad { gap: 4px; padding-bottom: 15px; }
            .row { gap: 4px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="tabs" id="tabsBox"></div>
        <button class="add-btn" onclick="window.addCalc()">+</button>
    </div>

    <div class="display" id="displayArea">
        <!-- ਹਿਸਟਰੀ - ਸਕਰੋਲ ਹੋ ਸਕਦੀ ਹੈ -->
        <div class="history-wrap" id="histWrap">
            <div class="history" id="histBox"></div>
        </div>
        <!-- ਮੁੱਖ ਇਨਪੁਟ + ਜਵਾਬ - ਹਮੇਸ਼ਾ ਥੱਲੇ ਦਿਖਦਾ ਹੈ -->
        <div class="input-result-wrap">
            <div class="main-input" id="inpBox"></div>
            <div class="live-result" id="liveBox"><span id="liveText"></span></div>
        </div>
    </div>

    <div class="keypad" id="keypadArea">
        <div class="row">
            <button class="btn btn-ac"    data-val="AC">C</button>
            <button class="btn btn-op"    data-val="BACK">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
            </button>
            <button class="btn btn-op c-op" style="font-size: 26px;" data-val="%">%</button>
            <button class="btn btn-op c-op" data-val="/">÷</button>
        </div>
        <div class="row">
            <button class="btn btn-num c-num" data-val="7">7</button>
            <button class="btn btn-num c-num" data-val="8">8</button>
            <button class="btn btn-num c-num" data-val="9">9</button>
            <button class="btn btn-op c-op"   data-val="*">×</button>
        </div>
        <div class="row">
            <button class="btn btn-num c-num" data-val="4">4</button>
            <button class="btn btn-num c-num" data-val="5">5</button>
            <button class="btn btn-num c-num" data-val="6">6</button>
            <button class="btn btn-op c-op"   style="font-size: 46px; padding-bottom: 6px;" data-val="-">-</button>
        </div>
        <div class="row">
            <button class="btn btn-num c-num" data-val="1">1</button>
            <button class="btn btn-num c-num" data-val="2">2</button>
            <button class="btn btn-num c-num" data-val="3">3</button>
            <button class="btn btn-op c-op"   style="font-size: 40px;" data-val="+">+</button>
        </div>
        <div class="row">
            <button class="action-btn"        data-action="reset">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
            <button class="action-btn delete-tab" data-action="deltab">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            </button>
            <button class="btn btn-num c-num"  data-val="0">0</button>
            <button class="btn btn-num c-num"  style="font-size: 36px; padding-bottom:10px;" data-val=".">.</button>
            <button class="btn btn-eq" id="eqBtn" data-val="=">=</button>
        </div>
    </div>

    <script>
        // ਸਰਵਿਸ ਵਰਕਰ
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js').then(function(registration) {
              console.log('SW registered');
            }).catch(function(err){});
          });
        }

        // ਡਾਟਾ ਸਟੋਰੇਜ
        // isResultState: ਇਹ ਦੱਸੇਗਾ ਕਿ ਸਕਰੀਨ 'ਤੇ ਜਵਾਬ ਹੈ ਜਾਂ ਨਹੀਂ
        var calcs = [{ id: 1, expr: '0', hist: '', isResultState: false }];
        var activeId = 1;
        var activeTokenIndex = null;
        var isOverwriting = false;

        var inpBox, histBox, liveBox, liveText, tabsBox;

        window.onload = function() {
            inpBox   = document.getElementById('inpBox');
            histBox  = document.getElementById('histBox');
            liveBox  = document.getElementById('liveBox');
            liveText = document.getElementById('liveText');
            tabsBox  = document.getElementById('tabsBox');

            // ===== ਤੁਰੰਤ ਟੱਚ ਸਿਸਟਮ =====
            var keypad = document.getElementById('keypadArea');
            var pressedBtn = null;

            keypad.addEventListener('touchstart', function(e) {
                e.preventDefault();
                var touch = e.changedTouches[0];
                var el = document.elementFromPoint(touch.clientX, touch.clientY);
                var btn = el ? el.closest('[data-val],[data-action]') : null;
                if (!btn) {
                    btn = findNearestBtn(touch.clientX, touch.clientY, keypad);
                }
                if (btn) {
                    pressedBtn = btn;
                    triggerBtn(btn);
                    btn.style.background = 'rgba(255,255,255,0.1)';
                }
            }, { passive: false });

            keypad.addEventListener('touchend', function(e) {
                if (pressedBtn) { pressedBtn.style.background = ''; pressedBtn = null; }
            }, { passive: true });

            keypad.addEventListener('touchcancel', function(e) {
                if (pressedBtn) { pressedBtn.style.background = ''; pressedBtn = null; }
            }, { passive: true });

            function findNearestBtn(x, y, container) {
                var btns = container.querySelectorAll('[data-val],[data-action]');
                var nearest = null, minDist = Infinity;
                btns.forEach(function(b) {
                    var rect = b.getBoundingClientRect();
                    var cx = rect.left + rect.width / 2;
                    var cy = rect.top + rect.height / 2;
                    var dist = Math.sqrt((x-cx)*(x-cx) + (y-cy)*(y-cy));
                    if (dist < minDist) { minDist = dist; nearest = b; }
                });
                return nearest;
            }

            function triggerBtn(btn) {
                var val = btn.getAttribute('data-val');
                var action = btn.getAttribute('data-action');
                if (val !== null) window.press(val);
                else if (action === 'reset') window.masterReset();
                else if (action === 'deltab') window.delTab();
            }

            // ===== ਸਵਾਈਪ: display ਤੇ ਉੱਪਰ/ਥੱਲੇ ਸਵਾਈਪ = keypad ਲੁਕਾਓ/ਦਿਖਾਓ =====
            var displayArea = document.getElementById('displayArea');
            var swipeStartY = null;
            var keypadHidden = false;

            displayArea.addEventListener('touchstart', function(e) {
                swipeStartY = e.touches[0].clientY;
            }, { passive: true });

            displayArea.addEventListener('touchend', function(e) {
                if (swipeStartY === null) return;
                var dy = e.changedTouches[0].clientY - swipeStartY;
                if (Math.abs(dy) < 30) { swipeStartY = null; return; } // ਛੋਟਾ ਟੱਚ ਅਣਡਿੱਠਾ
                if (dy > 0 && !keypadHidden) {
                    // ਹੇਠਾਂ ਸਵਾਈਪ → keypad ਲੁਕਾਓ
                    keypad.style.display = 'none';
                    keypadHidden = true;
                } else if (dy < 0 && keypadHidden) {
                    // ਉੱਪਰ ਸਵਾਈਪ → keypad ਵਾਪਸ ਲਿਆਓ
                    keypad.style.display = '';
                    keypadHidden = false;
                }
                swipeStartY = null;
            }, { passive: true });

            // ===== liveText ਸਿਰਫ਼ ਨੰਬਰ ਤੇ ਕਲਿੱਕ = ਜਵਾਬ =====
            document.getElementById('liveText').addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                window.press('=');
            }, { passive: false });

            // ===== histBox ਟੱਚ =====
            histBox.addEventListener('touchstart', function(e) {
                e.preventDefault();
                window.restoreHistory();
            }, { passive: false });

            try {
                var sData = localStorage.getItem('calcDataV13');
                var sId = localStorage.getItem('calcIdV13');
                if (!sData) { sData = localStorage.getItem('calcDataV12'); sId = localStorage.getItem('calcIdV12'); }
                if (!sData) { sData = localStorage.getItem('calcDataV11'); sId = localStorage.getItem('calcIdV11'); }
                if (!sData) { sData = localStorage.getItem('calcDataV10'); sId = localStorage.getItem('calcIdV10'); }
                if (!sData) { sData = localStorage.getItem('calcDataVFinal'); sId = localStorage.getItem('calcIdVFinal'); }
                if(sData) {
                    calcs = JSON.parse(sData);
                    // ਪੁਰਾਣੇ ਵਰਜਨ ਦੇ ਡਾਟਾ ਵਿੱਚ isResultState ਜੋੜਨ ਲਈ
                    for(var i=0; i<calcs.length; i++) {
                        if (calcs[i].isResultState === undefined) {
                            calcs[i].isResultState = false;
                        }
                    }
                }
                if(sId) activeId = parseInt(sId);
                
                if(!calcs || calcs.length === 0) calcs = [{ id: 1, expr: '0', hist: '', isResultState: false }];
                var found = false;
                for(var i=0; i<calcs.length; i++) if(calcs[i].id === activeId) found = true;
                if(!found) activeId = calcs[0].id;
            } catch(e) {
                calcs = [{ id: 1, expr: '0', hist: '', isResultState: false }];
                activeId = 1;
            }

            document.getElementById('displayArea').onclick = function(e) {
                if (e.target.id === 'histBox' || e.target.id === 'liveBox') return;
                if (activeTokenIndex !== null) {
                    activeTokenIndex = null;
                    updateUI();
                }
            };

            updateUI();
        };

        function save() {
            try {
                localStorage.setItem('calcDataV13', JSON.stringify(calcs));
                localStorage.setItem('calcIdV13', activeId.toString());
            } catch(e) {}
            updateUI();
        }

        function formatNumber(numStr) {
            if (!numStr || numStr === '-') return numStr;
            var parts = numStr.toString().split(".");
            if (parts[0].length > 0 && parts[0] !== '-') {
                var intPart = parts[0];
                var isNeg = intPart.startsWith('-');
                if (isNeg) intPart = intPart.substring(1);
                
                var lastThree = intPart.substring(intPart.length - 3);
                var otherNumbers = intPart.substring(0, intPart.length - 3);
                if(otherNumbers !== '') {
                    lastThree = ',' + lastThree;
                }
                var res = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree;
                
                parts[0] = isNeg ? '-' + res : res;
            }
            return parts.join(".");
        }

        // ਹਿਸਟਰੀ ਨੂੰ ਵਾਪਸ ਲਿਆਉਣ ਦਾ ਲੌਜਿਕ
        window.restoreHistory = function() {
            var act = null;
            for(var i=0; i<calcs.length; i++) {
                if(calcs[i].id === activeId) act = calcs[i];
            }
            if(!act || !act.hist) return;

            var histStr = act.hist;
            if (histStr.endsWith(' =')) {
                histStr = histStr.slice(0, -2);
            }
            histStr = histStr.replace(/×/g, '*').replace(/÷/g, '/');

            act.expr = histStr.replace(/,/g, ''); 
            act.hist = '';
            act.isResultState = false; // ਹਿਸਟਰੀ ਵਾਪਸ ਲਿਆਉਣ 'ਤੇ ਇਸਨੂੰ ਐਡਿਟੇਬਲ ਬਣਾਓ
            activeTokenIndex = null;
            save();
        };

        function updateUI() {
            if (!inpBox) return;
            
            var act = null;
            for(var i=0; i<calcs.length; i++) {
                if(calcs[i].id === activeId) act = calcs[i];
            }
            
            histBox.innerText = act.hist;

            var tokens = [];
            if (act.expr && act.expr.length > 0) {
                var match = act.expr.match(/([0-9.]+)|([+\-*/])/g);
                if (match) tokens = match;
            }
            if (tokens.length === 0) tokens = ['0'];
            
            inpBox.innerHTML = '';
            var displayStrLength = 0;

            for (var j = 0; j < tokens.length; j++) {
                var span = document.createElement('span');
                var val = tokens[j];
                var displayVal = val;
                
                if (val === '*') displayVal = '×';
                if (val === '/') displayVal = '÷';
                
                if (/[0-9.]/.test(val)) {
                    displayVal = formatNumber(val); 
                    span.className = 'num-token';
                } else {
                    span.className = 'op-token';
                }

                if (tokens.length > 1) {
                    span.className += ' clickable';
                    span.onclick = (function(idx) {
                        return function(e) {
                            e.stopPropagation(); 
                            activeTokenIndex = idx;
                            isOverwriting = true; 
                            updateUI();
                        };
                    })(j);
                }

                if (j === activeTokenIndex) {
                    span.className += ' selected';
                }

                span.innerText = displayVal;
                displayStrLength += displayVal.length;
                inpBox.appendChild(span);
            }

            // ਫੋਂਟ ਸਾਈਜ਼: 50,000+50,000+50,000+ (24 ਅੱਖਰ) ਇੱਕ ਲਾਈਨ ਵਿੱਚ ਆਉਣੇ ਚਾਹੀਦੇ ਹਨ
            if (displayStrLength <= 6)       inpBox.style.fontSize = '64px';
            else if (displayStrLength <= 10) inpBox.style.fontSize = '52px';
            else if (displayStrLength <= 16) inpBox.style.fontSize = '40px';
            else if (displayStrLength <= 24) inpBox.style.fontSize = '28px';
            else if (displayStrLength <= 34) inpBox.style.fontSize = '22px';
            else                             inpBox.style.fontSize = '18px';
            
            tabsBox.innerHTML = '';
            for(var k=0; k<calcs.length; k++) {
                var d = document.createElement('div');
                d.className = 'tab ' + (calcs[k].id === activeId ? 'active' : '');
                d.innerText = calcs[k].id;
                d.onclick = (function(id) { 
                    return function() { 
                        activeId = id; 
                        activeTokenIndex = null;
                        save(); 
                    } 
                })(calcs[k].id);
                tabsBox.appendChild(d);
            }

            try {
                var exprForLive = act.expr;
                while(exprForLive.length > 0 && /[+\-*/.]$/.test(exprForLive)) {
                    exprForLive = exprForLive.slice(0, -1);
                }
                if (exprForLive.length > 0 && /[+\-*/]/.test(exprForLive) && act.expr !== 'Error') {
                    var toEval = exprForLive;
                    var res = new Function('return ' + toEval)();
                    if (isFinite(res)) {
                        var roundedRes = Math.round(res * 100000000)/100000000;
                        liveText.innerText = "= " + formatNumber(roundedRes);
                    } else {
                        liveText.innerText = "";
                    }
                } else {
                    liveText.innerText = "";
                }
            } catch(e) { liveText.innerText = ""; }

            // ਹਿਸਟਰੀ ਸਕਰੋਲ ਹਮੇਸ਼ਾ ਥੱਲੇ ਤੱਕ ਰਹੇ
            var hw = document.getElementById('histWrap');
            if (hw) hw.scrollTop = hw.scrollHeight;
            
            // ਨੰਬਰ/ਨਿਸ਼ਾਨ ਡਿਸਏਬਲ (ਮੱਧਮ) ਕਰਨ ਦਾ ਲੌਜਿਕ
            var numBtns = document.querySelectorAll('.c-num');
            var opBtns = document.querySelectorAll('.c-op');
            
            numBtns.forEach(function(b) { b.classList.remove('disabled'); });
            opBtns.forEach(function(b) { b.classList.remove('disabled'); });

            if (activeTokenIndex !== null) {
                var activeToken = tokens[activeTokenIndex];
                var isOpToken = ['+', '-', '*', '/'].indexOf(activeToken) !== -1;
                
                if (isOpToken) {
                    numBtns.forEach(function(b) { b.classList.add('disabled'); });
                } else {
                    opBtns.forEach(function(b) { b.classList.add('disabled'); });
                }
            }

            // ਟਿੱਕ ਮਾਰਕ ਬਟਨ
            var eqBtn = document.getElementById('eqBtn');
            if (eqBtn) {
                if (activeTokenIndex !== null) {
                    eqBtn.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                    eqBtn.style.backgroundColor = '#62AEEF'; 
                    eqBtn.style.color = '#fff';
                } else {
                    eqBtn.innerHTML = '=';
                    eqBtn.style.backgroundColor = '#F07041';
                    eqBtn.style.color = '#fff';
                }
            }

            var displayDiv = document.getElementById('displayArea');
            displayDiv.scrollTop = displayDiv.scrollHeight;
        }

        window.addCalc = function() {
            var max = 0;
            for(var i=0; i<calcs.length; i++) { if(calcs[i].id > max) max = calcs[i].id; }
            calcs.push({ id: max + 1, expr: '0', hist: '', isResultState: false });
            activeId = max + 1;
            activeTokenIndex = null;
            save();
        };

        window.masterReset = function() {
            if(confirm("ਕੀ ਤੁਸੀਂ ਸਭ ਕੁਝ ਡਿਲੀਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
                calcs = [{ id: 1, expr: '0', hist: '', isResultState: false }];
                activeId = 1;
                activeTokenIndex = null;
                save();
            }
        };

        window.delTab = function() {
            if(calcs.length <= 1) return;
            if(confirm("ਕੀ ਤੁਸੀਂ ਇਹ ਕੈਲਕੁਲੇਟਰ ਡਿਲੀਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
                var nw = [];
                for(var i=0; i<calcs.length; i++) {
                    if(calcs[i].id !== activeId) nw.push(calcs[i]);
                }
                calcs = nw;
                activeId = calcs[calcs.length - 1].id;
                activeTokenIndex = null;
                save();
            }
        };

        window.press = function(val) {
            var act = null;
            for(var i=0; i<calcs.length; i++) {
                if(calcs[i].id === activeId) act = calcs[i];
            }

            var ex = act.expr;
            if(ex === 'Error') ex = '0';
            
            var tokens = ex.match(/([0-9.]+)|([+\-*/])/g) || [];
            var ops = ['+', '-', '*', '/'];

            if (val === 'AC') {
                act.expr = '0';
                act.hist = '';
                act.isResultState = false;
                activeTokenIndex = null;
            } 
            else if (val === 'BACK') {
                if (activeTokenIndex !== null) {
                    var edited = tokens[activeTokenIndex];
                    if (/[0-9.]/.test(edited)) {
                        // ਸਲੈਕਟਡ ਨੰਬਰ ਨੂੰ ਇੱਕੋ ਵਾਰ ਸਾਰਾ ਕੱਟੋ → '0' ਕਰੋ, ਸਲੈਕਟਡ ਰਹੇ
                        tokens[activeTokenIndex] = '0';
                        isOverwriting = true; // ਨਵਾਂ ਨੰਬਰ ਟਾਈਪ ਕਰਨ ਲਈ ਤਿਆਰ
                    } else {
                        // ਆਪਰੇਟਰ ਟੋਕਨ ਸੀ - ਉਸਨੂੰ ਹਟਾਓ
                        tokens.splice(activeTokenIndex, 1);
                        if(tokens.length === 0) tokens.push('0');
                        activeTokenIndex = null; 
                    }
                    act.expr = tokens.join('');
                } else {
                    act.expr = ex.length > 1 ? ex.slice(0, -1) : '0';
                }
                act.isResultState = false;
            }
            else if (val === '=') {
                if (activeTokenIndex !== null) {
                    activeTokenIndex = null;
                    isOverwriting = false;
                    save();
                    return;
                }

                if (!/[+\-*/]/.test(ex)) {
                    return;
                }

                activeTokenIndex = null; 
                try {
                    while(ex.length > 0 && /[+\-*/.]$/.test(ex)) {
                        ex = ex.slice(0, -1);
                    }
                    var toEval = ex;
                    var res = new Function('return ' + toEval)();
                    if(isFinite(res)) {
                        var formattedEx = "";
                        var histTokens = ex.match(/([0-9.]+)|([+\-*/])/g) || [];
                        for (var t=0; t<histTokens.length; t++) {
                            if (/[0-9.]/.test(histTokens[t])) {
                                formattedEx += formatNumber(histTokens[t]);
                            } else {
                                formattedEx += histTokens[t].replace('*', '×').replace('/', '÷');
                            }
                        }
                        act.hist = formattedEx + " =";
                        act.expr = String(Math.round(res * 100000000)/100000000);
                        act.isResultState = true; // ਇਹ ਫਲੈਗ ਦੱਸਦਾ ਹੈ ਕਿ ਹੁਣ ਸਕਰੀਨ 'ਤੇ ਜਵਾਬ ਹੈ
                    }
                } catch(e) {
                    act.expr = 'Error';
                    act.isResultState = false;
                    setTimeout(function(){ act.expr = ex; save(); }, 1000);
                }
            }
            else if (val === '%') {
                var targetIdx = activeTokenIndex !== null ? activeTokenIndex : tokens.length - 1;
                
                if (/[0-9.]/.test(tokens[targetIdx])) {
                    var num = Number(tokens[targetIdx]);
                    if (targetIdx >= 2 && ops.indexOf(tokens[targetIdx - 1]) !== -1) {
                        var op = tokens[targetIdx - 1];
                        var baseExpr = tokens.slice(0, targetIdx - 1).join('');
                        try {
                            var baseVal = new Function('return ' + baseExpr)();
                            if (op === '+' || op === '-') {
                                tokens[targetIdx] = String(Math.round(baseVal * (num / 100) * 100000000)/100000000);
                            } else {
                                tokens[targetIdx] = String(Math.round((num / 100) * 100000000)/100000000);
                            }
                        } catch(e) {}
                    } else {
                        tokens[targetIdx] = String(Math.round((num / 100) * 100000000)/100000000);
                    }
                    act.expr = tokens.join('');
                    activeTokenIndex = null;
                }
                act.isResultState = false;
            }
            else if (ops.indexOf(val) !== -1) {
                // ਜੇਕਰ ਕੋਈ ਨਿਸ਼ਾਨ ਦਬਾਇਆ ਗਿਆ ਹੈ
                if (activeTokenIndex !== null && ops.indexOf(tokens[activeTokenIndex]) !== -1) {
                    tokens[activeTokenIndex] = val;
                    act.expr = tokens.join('');
                    activeTokenIndex = null;
                } else {
                    activeTokenIndex = null; 
                    var last = ex.slice(-1);
                    if (ops.indexOf(last) !== -1) {
                        act.expr = ex.slice(0, -1) + val;
                    } else {
                        act.expr += val;
                    }
                }
                // ਨਿਸ਼ਾਨ ਦਬਾਉਣ 'ਤੇ ਜਵਾਬ ਵਾਲੀ ਸਟੇਟ ਖਤਮ ਹੋ ਜਾਂਦੀ ਹੈ (ਭਾਵ ਹੁਣ ਹੋਰ ਕੈਲਕੂਲੇਸ਼ਨ ਹੋਵੇਗੀ)
                act.isResultState = false;
            }
            else {
                // ਜੇਕਰ ਕੋਈ ਨੰਬਰ (ਜਾਂ ਬਿੰਦੂ) ਦਬਾਇਆ ਗਿਆ ਹੈ
                if (activeTokenIndex !== null) {
                    if (ops.indexOf(tokens[activeTokenIndex]) !== -1) {
                        activeTokenIndex = null;
                        if (ex === '0' && val !== '.') act.expr = val;
                        else if (val === '.') act.expr += '0.'; 
                        else act.expr += val;
                    } else {
                        if (isOverwriting) {
                            if (val === '.') tokens[activeTokenIndex] = '0.';
                            else tokens[activeTokenIndex] = val; 
                            isOverwriting = false; 
                        } else {
                            if (val === '.' && tokens[activeTokenIndex].indexOf('.') !== -1) {
                            } else {
                                if (tokens[activeTokenIndex] === '0' && val !== '.') {
                                    tokens[activeTokenIndex] = val;
                                } else {
                                    tokens[activeTokenIndex] += val; 
                                }
                            }
                        }
                        act.expr = tokens.join('');
                    }
                    act.isResultState = false;
                } else {
                    // ਨਵਾਂ ਲੌਜਿਕ: ਜੇਕਰ ਸਕਰੀਨ 'ਤੇ ਜਵਾਬ ਹੈ ਅਤੇ ਅਸੀਂ ਨਵਾਂ ਨੰਬਰ ਦਬਾਇਆ ਹੈ
                    if (act.isResultState) {
                        if (val === '.') {
                            act.expr = '0.';
                        } else {
                            act.expr = val; // ਪੁਰਾਣਾ ਜਵਾਬ ਮਿਟਾ ਕੇ ਨਵਾਂ ਨੰਬਰ ਲਿਖੋ
                        }
                        act.hist = ''; // ਹਿਸਟਰੀ ਵੀ ਮਿਟਾ ਦਿਓ (ਨਵੀਂ ਕੈਲਕੂਲੇਸ਼ਨ ਸ਼ੁਰੂ)
                        act.isResultState = false;
                    } 
                    else {
                        // ਆਮ ਹਾਲਤ: ਨੰਬਰ ਪਿੱਛੇ ਜੋੜਦੇ ਜਾਓ
                        if (val === '.') {
                            var lastToken = tokens[tokens.length - 1] || '0';
                            if (ops.indexOf(lastToken) !== -1) {
                                act.expr += '0.';
                            } else if (lastToken.indexOf('.') === -1) {
                                act.expr += '.';
                            }
                        } else {
                            if (ex === '0' && val !== '.') act.expr = val;
                            else act.expr += val;
                        }
                    }
                }
            }
            save();
        };

    </script>
